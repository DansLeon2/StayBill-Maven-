# StayBill - Tema personalizado FlatLaf
# Paleta base:
# Negro: #231f20 | Vino: #700238 | Gris: #6d7175 | Gris claro: #c7d2d5 | Blanco: #ecebf3

# ---- Colores principales ----
@background = #231f20
@foreground = #ecebf3
@accentColor = #700238
@buttonBackground = #6d7175
@buttonForeground = #ecebf3
@componentBackground = #c7d2d5
@disabledBackground = #2c2c2c
@disabledForeground = #8b8b8b

# ---- Estructura de UI ----
Component.arc = 14
Button.arc = 18
TextComponent.arc = 10
Component.focusWidth = 1
Component.innerFocusWidth = 0

# ---- Bordes y l\u00edneas ----
Component.borderColor = #6d7175
Button.borderColor = #700238
Button.hoverBorderColor = #8c0342
Component.focusColor = #700238

# ---- Botones ----
Button.hoverBackground = darken(@accentColor,10%)
Button.pressedBackground = darken(@accentColor,20%)
Button.selectedBackground = @accentColor
Button.disabledBackground = #6d7175
Button.foreground = @buttonForeground

# ---- Textos ----
Label.foreground = #ecebf3
TitlePane.foreground = #ecebf3
TextField.foreground = #231f20
TextField.background = #ecebf3
TextField.placeholderForeground = #6d7175

# ---- Tablas ----
Table.background = #ecebf3
Table.foreground = #231f20
Table.selectionBackground = @accentColor
Table.selectionForeground = #ecebf3
Table.gridColor = #c7d2d5
Table.alternateRowColor = #f5f5f5

# ---- Paneles ----
Panel.background = #231f20
PopupMenu.background = #231f20
MenuItem.selectionBackground = @accentColor
MenuItem.selectionForeground = #ecebf3

# ---- Fuentes ----
defaultFont = 14 "Segoe UI"

